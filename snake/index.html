<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<base href="/snake/">
<title>Snake — Stackable</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="wrap">
    <header class="head">
      <h1>Snake</h1>
    </header>

    <section class="card">
      <div id="hud" class="hud">
        <div class="stat"><span class="label">Score</span><span id="score" class="value">0</span></div>
        <div class="stat"><span class="label">Best</span><span id="best" class="value">0</span></div>
      </div>

      <div class="board-wrap">
        <canvas id="board" width="480" height="480" aria-label="Snake game board"></canvas>
        <div id="overlay" class="overlay" data-state="idle">
          <div class="overlay-inner">
            <p id="overlay-title" class="overlay-title"></p>
            <p id="overlay-msg" class="overlay-msg"></p>
            <button id="start" class="btn-primary" type="button">Start</button>
            <p class="overlay-hint">Arrows, WASD, or swipe</p>
          </div>
        </div>
      </div>

      <div class="controls">
        <button id="reset" class="btn-secondary" type="button">Reset</button>
      </div>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
