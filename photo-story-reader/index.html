<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Story Reader</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg:       #F2F0EB;
      --color-surface:  #FAFAF7;
      --color-text:     #1A1A1A;
      --color-text-sec: #6B6568;
      --color-border:   #E8E2D9;
    }

    html, body {
      background: var(--color-bg);
      font-family: 'Inter', sans-serif;
    }

    /* ─── Section ─── */
    section.story-section {
      background: var(--color-bg);
      padding: clamp(48px, 8vw, 100px) clamp(24px, 6vw, 80px);
    }

    /* ─── Layout ─── */
    .story-layout {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .story-caption {
      font-family: 'Inter', sans-serif;
      font-size: clamp(1rem, 1.5vw, 1.25rem);
      font-weight: 600;
      line-height: 1.3;
      color: var(--color-text-sec);
      text-align: center;
      max-width: 480px;
    }

    /* ─── Photo card ─── */
    .photo-card {
      border-radius: 16px;
      background: var(--color-surface);
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      overflow: hidden;
      border: 1px solid var(--color-border);
      user-select: none;
    }

    /* Photo area */
    .photo-area {
      aspect-ratio: 4 / 3;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .photo-slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .photo-slide.active {
      opacity: 1;
      pointer-events: auto;
    }
    .photo-slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* ─── Card footer ─── */
    .card-footer {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--color-bg);
      border-top: 1px solid var(--color-border);
    }

    /* Arrow buttons */
    .arrow-btn {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: 1px solid var(--color-border);
      background: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--color-text-sec);
      transition: border-color 0.15s, color 0.15s, opacity 0.2s;
      line-height: 1;
    }
    .arrow-btn:hover:not(:disabled) {
      border-color: var(--color-text-sec);
      color: var(--color-text);
    }
    .arrow-btn:active:not(:disabled) { transform: scale(0.92); }
    .arrow-btn:disabled {
      opacity: 0.3;
      cursor: default;
      pointer-events: none;
    }

    /* Page counter */
    .page-counter {
      flex: 1;
      text-align: center;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      color: var(--color-text-sec);
    }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      .story-layout { gap: 16px; }
    }

    /* ── EDITOR TOOLBAR (remove before production) ── */
    .editor-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: #1A1A1A;
      color: #FFFFFF;
      font-size: 12px;
      font-family: 'Inter', sans-serif;
    }
    .editor-bar span {
      opacity: 0.5;
      letter-spacing: 0.03em;
    }
    .editor-bar .save-btn {
      padding: 6px 18px;
      border-radius: 6px;
      border: none;
      background: #120DA6;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .editor-bar .save-btn:hover { opacity: 0.9; }
    .editor-bar .save-btn.saved {
      background: #34c759;
      pointer-events: none;
    }

    /* push page content below the bar */
    body { padding-top: 40px; }

    /* editable highlight */
    [contenteditable="true"] {
      outline: none;
      border-radius: 4px;
      transition: box-shadow 0.15s;
    }
    [contenteditable="true"]:hover {
      box-shadow: 0 0 0 2px rgba(18, 13, 166, 0.15);
    }
    [contenteditable="true"]:focus {
      box-shadow: 0 0 0 2px rgba(18, 13, 166, 0.4);
    }

  </style>
</head>
<body>

  <!-- Editor toolbar — remove before production -->
  <div class="editor-bar">
    <span>EDIT MODE — click any text to edit</span>
    <button class="save-btn" onclick="saveFile()">Save file</button>
  </div>

  <section class="story-section">
    <div class="story-layout">

      <!-- Photo card -->
      <div class="photo-card" id="photoCard" style="width: 100%;">

        <!-- Photo area -->
        <div class="photo-area" id="photoArea">
          <!-- Slides injected by JS -->
        </div>

        <!-- Card footer -->
        <div class="card-footer">
          <button class="arrow-btn" id="prevBtn" onclick="navigate(-1)" aria-label="Previous page" disabled>&#8249;</button>
          <span class="page-counter" id="pageCounter">1 / 13</span>
          <button class="arrow-btn" id="nextBtn" onclick="navigate(1)" aria-label="Next page">&#8250;</button>
        </div>

      </div>

      <!-- Caption below -->
      <p class="story-caption" contenteditable="true">Robbie S. made this for a student in his class who wanted to make stronger friendships.</p>

    </div>
  </section>

  <script>
    // ── Story pages ──
    const TOTAL = 13;
    let current = 0;

    // ── Build slides ──
    const photoArea = document.getElementById('photoArea');
    for (let i = 0; i < TOTAL; i++) {
      const slide = document.createElement('div');
      slide.className = 'photo-slide' + (i === 0 ? ' active' : '');
      slide.id = `slide-${i}`;
      const img = document.createElement('img');
      img.src = `../_assets/friendship-string/${i + 1}.png`;
      img.alt = `Page ${i + 1}`;
      slide.appendChild(img);
      photoArea.appendChild(slide);
    }

    // ── Navigation ──
    function navigate(dir) {
      document.getElementById(`slide-${current}`).classList.remove('active');
      current = Math.max(0, Math.min(TOTAL - 1, current + dir));
      document.getElementById(`slide-${current}`).classList.add('active');
      document.getElementById('pageCounter').textContent = `${current + 1} / ${TOTAL}`;
      document.getElementById('prevBtn').disabled = (current === 0);
      document.getElementById('nextBtn').disabled = (current === TOTAL - 1);
    }

    // ── Keyboard navigation ──
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') navigate(1);
      if (e.key === 'ArrowLeft' && current > 0) navigate(-1);
    });

    // ── Touch/swipe support ──
    let touchStartX = 0;
    photoArea.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
    }, { passive: true });
    photoArea.addEventListener('touchend', (e) => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 40) {
        if (dx < 0) navigate(1);
        else if (current > 0) navigate(-1);
      }
    }, { passive: true });

    /* ── EDITOR: Save file ── */
    function saveFile() {
      var clone = document.documentElement.cloneNode(true);

      // Remove editor bar
      var bar = clone.querySelector('.editor-bar');
      if (bar) bar.remove();

      // Remove editor-specific CSS
      var styles = clone.querySelectorAll('style');
      styles.forEach(function(s) {
        s.textContent = s.textContent
          .replace(/\/\*\s*── EDITOR TOOLBAR[\s\S]*?body\s*\{\s*padding-top:\s*40px;\s*\}/, '')
          .replace(/\/\*\s*editable highlight[\s\S]*?\[contenteditable="true"\]:focus\s*\{[^}]*\}/, '');
      });

      // Remove contenteditable attributes
      clone.querySelectorAll('[contenteditable]').forEach(function(el) {
        el.removeAttribute('contenteditable');
      });

      // Remove padding-top from body
      var body = clone.querySelector('body');
      if (body) body.style.paddingTop = '';

      // Remove the editor script block
      var scripts = clone.querySelectorAll('script');
      scripts.forEach(function(s) {
        s.textContent = s.textContent.replace(/\/\*\s*── EDITOR:[\s\S]*$/, '');
      });

      var html = '<!DOCTYPE html>\n' + clone.outerHTML;
      var blob = new Blob([html], { type: 'text/html' });
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'photo-story-reader.html';
      a.click();
      URL.revokeObjectURL(a.href);

      var btn = document.querySelector('.save-btn');
      btn.textContent = 'Saved \u2713';
      btn.className = 'save-btn saved';
      setTimeout(function() {
        btn.textContent = 'Save file';
        btn.className = 'save-btn';
      }, 2000);
    }
  </script>

</body>
</html>
