<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Lesson</title>

  <!--
    ══════════════════════════════════════════════════════════════
      LESSON CONFIG — edit this block per brick.

      • goal      One-line statement shown at the top of the drawer.
      • sections  Ordered list of screens in this lesson.

      Each section:
        id          Short kebab-case id, unique within the lesson.
        label       Short verb/action label shown in the drawer + bar.
        display     Visible type badge. Use "Read", "Reflect", or "Activity".
        weight      How much of the progress bar this section represents.
        type        How the section marks itself complete:
                      "view"        — passive, completes after a short dwell
                                      (reading / watching / orienting).
                      "auto"        — completes instantly on activation
                                      (placeholders, splash screens).
                      "event"       — active; waits for a postMessage
                                      { type: "sectionComplete", id } from
                                      inside the iframe before unlocking Next.
        dwell       (view only) ms before auto-complete. Default 1200.
        src         Path to the HTML file for this section's iframe.
                    Relative to this file, sibling to MasterBrick.
        placeholder (optional) Use instead of src to render a text-only
                    placeholder screen (for sections not yet built).
    ══════════════════════════════════════════════════════════════
  -->
  <script id="lesson-config" type="application/json">
  {
    "goal": "By the end, you'll know how to write a Social Story for one learner.",
    "sections": [
      { "id": "welcome", "label": "Welcome",       "display": "Read",     "weight": 1, "type": "view",  "dwell": 1200, "src": "orientation.html" },
      { "id": "scene",   "label": "Set the scene", "display": "Read",     "weight": 1, "type": "auto",  "placeholder": "Set the scene — coming soon" },
      { "id": "checkin", "label": "Check in",      "display": "Reflect",  "weight": 1, "type": "event", "src": "multi-select.html" },
      { "id": "choice",  "label": "Make a choice", "display": "Activity", "weight": 2, "type": "event", "src": "branching-scenario.html" },
      { "id": "wrap",    "label": "Wrap up",       "display": "Read",     "weight": 1, "type": "view",  "dwell": 1200, "src": "summary.html" }
    ]
  }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --text: #1d1d1f;
      --text-soft: #6e6e73;
      --border: rgba(0, 0, 0, 0.10);
      --border-soft: rgba(0, 0, 0, 0.06);
      --hover: rgba(0, 0, 0, 0.06);
      --hover-strong: rgba(0, 0, 0, 0.10);
      --frame-pad: clamp(16px, 2.4vw, 28px);
      --bar-h: 64px;
      --font-body: 14px;
      --font-label: 16px;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      font-size: var(--font-body);
    }

    /* ── Stage: framed window the sections live inside ── */
    .stage {
      position: fixed;
      top: var(--frame-pad);
      right: var(--frame-pad);
      bottom: calc(var(--bar-h) + var(--frame-pad));
      left: var(--frame-pad);
      background: var(--surface);
      border: 1px solid var(--border-soft);
      border-radius: 14px;
      overflow: hidden;
    }
    .stage > .section {
      position: absolute;
      inset: 0;
      display: none;
      opacity: 0;
      transition: opacity 140ms ease;
    }
    .stage > .section.is-active {
      display: block;
      opacity: 1;
    }

    .section iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
    }

    /* ── Loading / error overlays for iframe sections ── */
    .section-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--surface);
      color: var(--text-soft);
      font-size: var(--font-body);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
    }
    .section.is-loading .section-overlay.loading,
    .section.is-error   .section-overlay.error {
      opacity: 1;
      pointer-events: auto;
    }
    .spinner {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      border: 2px solid rgba(0, 0, 0, 0.10);
      border-top-color: var(--text);
      animation: spin 700ms linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .section-overlay.error .retry {
      appearance: none;
      border: 0;
      font: inherit;
      font-size: var(--font-body);
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 999px;
      background: var(--text);
      color: #fff;
      cursor: pointer;
    }

    /* Placeholder section (set the scene) */
    .section.placeholder {
      align-items: center;
      justify-content: center;
      color: var(--text-soft);
      background: var(--bg);
      font-size: var(--font-label);
    }
    .section.placeholder.is-active {
      display: flex;
    }

    /* ── Floating sections drawer ── */
    .sections-scrim {
      position: fixed;
      inset: 0;
      z-index: 15;
      background: rgba(20, 20, 22, 0.18);
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease;
    }
    body.sections-open .sections-scrim {
      opacity: 1;
      pointer-events: auto;
    }

    .sections-drawer {
      position: fixed;
      top: 16px;
      bottom: 16px;
      left: 16px;
      width: 280px;
      z-index: 20;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-radius: 18px;
      border: 1px solid var(--border-soft);
      transform: translateX(calc(-100% - 24px));
      opacity: 0;
      transition: transform 240ms cubic-bezier(.2,.8,.2,1), opacity 180ms ease;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18), 0 4px 12px rgba(0, 0, 0, 0.06);
      overflow: hidden;
    }
    body.sections-open .sections-drawer {
      transform: translateX(0);
      opacity: 1;
    }

    .sections-header {
      padding: 22px 22px 18px;
      border-bottom: 1px solid var(--border-soft);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .sections-goal {
      font-size: var(--font-label);
      font-weight: 600;
      line-height: 1.35;
      color: var(--text);
      max-width: 200px;
    }
    .sections-close {
      appearance: none;
      border: 0;
      background: var(--hover);
      width: 28px;
      height: 28px;
      border-radius: 999px;
      cursor: pointer;
      color: var(--text);
      font-size: 18px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 140ms ease;
      flex: 0 0 auto;
    }
    .sections-close:hover { background: var(--hover-strong); }

    .sections-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 10px 16px;
      list-style: none;
      margin: 0;
    }
    .sections-item {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 12px 12px;
      border-radius: 10px;
      background: transparent;
      border: 0;
      font: inherit;
      font-size: var(--font-body);
      text-align: left;
      cursor: pointer;
      color: var(--text);
      transition: background 140ms ease;
    }
    .sections-item:hover { background: var(--hover); }
    .sections-item.is-current { background: rgba(29, 29, 31, 0.08); }
    .sections-item .num {
      flex: 0 0 28px;
      height: 28px;
      border-radius: 999px;
      background: transparent;
      border: 1.5px solid rgba(0, 0, 0, 0.18);
      color: var(--text-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--font-body);
      font-weight: 600;
    }
    .sections-item.is-completed .num {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }
    .sections-item.is-current .num {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }
    .sections-item .label-wrap {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
      flex: 1 1 auto;
    }
    .sections-item .label {
      font-size: var(--font-body);
      font-weight: 500;
      line-height: 1.2;
    }
    .sections-item .type-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-soft);
      line-height: 1;
    }
    .sections-item .type {
      font-weight: 500;
      letter-spacing: 0.01em;
    }
    .sections-item .skip-hint {
      font-style: italic;
    }
    .sections-item.is-completed .skip-hint,
    .sections-item.is-current   .skip-hint {
      display: none;
    }

    /* ── Bottom bar ── */
    .nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--bar-h);
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 16px;
      padding: 0 var(--frame-pad);
      background: var(--surface);
      border-top: 1px solid var(--border-soft);
    }

    .nav-left  { display: flex; justify-content: flex-start; align-items: center; gap: 8px; min-width: 0; }
    .nav-right { display: flex; justify-content: flex-end;  align-items: center; gap: 8px; min-width: 0; }

    .nav-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 240px;
      max-width: 420px;
    }

    .nav-center .progress-track {
      width: 100%;
      height: 3px;
      background: rgba(0, 0, 0, 0.08);
      border-radius: 999px;
      overflow: hidden;
    }
    .nav-center .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--text);
      border-radius: 999px;
      transition: width 280ms cubic-bezier(.2,.8,.2,1);
    }
    .nav-center .progress-label {
      font-size: var(--font-body);
      color: var(--text-soft);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    /* ── Buttons ── */
    .btn {
      appearance: none;
      border: 0;
      cursor: pointer;
      font: inherit;
      font-size: var(--font-body);
      font-weight: 600;
      padding: 0 18px;
      height: 40px;
      border-radius: 999px;
      transition: background 140ms ease, opacity 180ms ease, color 140ms ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .btn-back {
      background: transparent;
      color: var(--text-soft);
      padding: 0 12px;
    }
    .btn-back:hover { color: var(--text); background: var(--hover); }

    .btn-sections {
      background: transparent;
      color: var(--text-soft);
      padding: 0 12px;
    }
    .btn-sections:hover { color: var(--text); background: var(--hover); }
    .btn-sections .icon {
      display: inline-flex;
      flex-direction: column;
      gap: 3px;
    }
    .btn-sections .icon span {
      display: block;
      width: 14px;
      height: 1.5px;
      background: currentColor;
      border-radius: 1px;
    }

    .btn-next {
      background: var(--text);
      color: #fff;
    }
    .btn-next:hover { background: #000; }

    .nav .is-hidden {
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
    }

    .handoff {
      font-size: var(--font-body);
      color: var(--text-soft);
      font-weight: 500;
      padding: 0 12px;
      text-align: right;
      max-width: 280px;
      line-height: 1.35;
      display: none;
    }
    .handoff.is-visible { display: block; }
  </style>
</head>
<body>
  <div class="sections-scrim" id="sectionsScrim"></div>

  <aside class="sections-drawer" id="sectionsDrawer" aria-label="Sections">
    <div class="sections-header">
      <div class="sections-goal" id="sectionsGoal"></div>
      <button class="sections-close" id="sectionsClose" aria-label="Close sections">×</button>
    </div>
    <ul class="sections-list" id="sectionsList"></ul>
  </aside>

  <!-- Stage is populated from the lesson-config block at script load time. -->
  <div class="stage" id="stage"></div>

  <nav class="nav">
    <div class="nav-left">
      <button class="btn btn-sections" id="sectionsToggle" aria-label="Open sections">
        <span class="icon"><span></span><span></span><span></span></span>
        Sections
      </button>
      <button class="btn btn-back" id="back">← Back</button>
    </div>

    <div class="nav-center">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel">Welcome</div>
    </div>

    <div class="nav-right">
      <div class="handoff" id="handoff">You're done — use <strong>Complete &amp; continue</strong> below ↓</div>
      <button class="btn btn-next" id="next">Next →</button>
    </div>
  </nav>

  <script>
    /* ──────────────────────────────────────────────
       Parse lesson-config block and build the stage.

       See the <script id="lesson-config"> block at the
       top of this file for the config shape.
    ────────────────────────────────────────────── */
    const CONFIG = (() => {
      try {
        const node = document.getElementById('lesson-config');
        return JSON.parse(node.textContent);
      } catch (err) {
        console.error('lesson-config is missing or not valid JSON:', err);
        return { goal: '', sections: [] };
      }
    })();

    const SECTIONS = CONFIG.sections;
    // Which display types count as "active" for the skip-warning indicator.
    const ACTIVE_DISPLAYS = new Set(['Reflect', 'Activity']);

    // Populate the drawer goal line.
    document.getElementById('sectionsGoal').textContent = CONFIG.goal || '';

    // Build the stage: one .section element per config entry.
    // iframe sections get loading + error overlays; placeholder
    // sections render a centered text block.
    (function buildStage() {
      const stage = document.getElementById('stage');
      SECTIONS.forEach((s) => {
        const el = document.createElement('div');
        el.className = 'section';
        el.dataset.id = s.id;

        if (s.src) {
          el.classList.add('is-loading');
          const iframe = document.createElement('iframe');
          iframe.src = s.src;
          el.appendChild(iframe);

          const loading = document.createElement('div');
          loading.className = 'section-overlay loading';
          loading.innerHTML = '<div class="spinner"></div><div>Loading…</div>';
          el.appendChild(loading);

          const error = document.createElement('div');
          error.className = 'section-overlay error';
          const errMsg = document.createElement('div');
          errMsg.textContent = "Couldn't load this section.";
          const retry = document.createElement('button');
          retry.type = 'button';
          retry.className = 'retry';
          retry.textContent = 'Try again';
          error.appendChild(errMsg);
          error.appendChild(retry);
          el.appendChild(error);
        } else {
          el.classList.add('placeholder');
          el.textContent = s.placeholder || '';
        }

        stage.appendChild(el);
      });
    })();
    const TOTAL_WEIGHT = SECTIONS.reduce((s, x) => s + x.weight, 0);

    /* ──────────────────────────────────────────────
       Lesson state — visited / completed / per-section data
    ────────────────────────────────────────────── */
    const state = {
      currentIdx: 0,
      visited: new Set(),
      completed: new Set(),
      data: {},        // { sectionId: anyShape }
      dwellTimers: {}, // pending view-section completion timers
    };

    const sectionEls = [...document.querySelectorAll('.stage > .section')];

    const progressFill  = document.getElementById('progressFill');
    const progressLabel = document.getElementById('progressLabel');
    const backBtn       = document.getElementById('back');
    const nextBtn       = document.getElementById('next');
    const handoffEl     = document.getElementById('handoff');
    const sectionsList  = document.getElementById('sectionsList');
    const sectionsToggle= document.getElementById('sectionsToggle');

    /* ──────────────────────────────────────────────
       Drawer
    ────────────────────────────────────────────── */
    SECTIONS.forEach((s, idx) => {
      const li = document.createElement('li');
      const btn = document.createElement('button');
      btn.className = 'sections-item';
      btn.dataset.id = s.id;
      btn.innerHTML =
        '<span class="num"></span>' +
        '<span class="label-wrap">' +
          '<span class="label"></span>' +
          '<span class="type-row">' +
            '<span class="type"></span>' +
            '<span class="skip-hint" hidden>Not done yet</span>' +
          '</span>' +
        '</span>';
      btn.querySelector('.num').textContent = idx + 1;
      btn.querySelector('.label').textContent = s.label;
      btn.querySelector('.type').textContent = s.display;
      btn.addEventListener('click', () => {
        show(idx);
        closeSections();
      });
      li.appendChild(btn);
      sectionsList.appendChild(li);
    });

    function openSections()  { document.body.classList.add('sections-open'); }
    function closeSections() { document.body.classList.remove('sections-open'); }
    function toggleSections(){ document.body.classList.toggle('sections-open'); }

    sectionsToggle.addEventListener('click', toggleSections);
    document.getElementById('sectionsClose').addEventListener('click', closeSections);
    document.getElementById('sectionsScrim').addEventListener('click', closeSections);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeSections();
    });

    /* ──────────────────────────────────────────────
       Render — runs on every state change
    ────────────────────────────────────────────── */
    function render() {
      // Active section
      sectionEls.forEach((el, k) => el.classList.toggle('is-active', k === state.currentIdx));

      // Drawer items: current + completed states + skip-hint for active
      // sections that the learner has visited but not yet completed.
      sectionsList.querySelectorAll('.sections-item').forEach((el, k) => {
        const s = SECTIONS[k];
        const isCompleted = state.completed.has(s.id);
        const isCurrent   = k === state.currentIdx;
        el.classList.toggle('is-current',   isCurrent);
        el.classList.toggle('is-completed', isCompleted);
        // Show the "Not done yet" hint on active sections that are visited
        // but not yet completed (i.e. the learner started and moved on).
        const hint = el.querySelector('.skip-hint');
        if (hint) {
          const showHint = ACTIVE_DISPLAYS.has(s.display)
            && state.visited.has(s.id)
            && !isCompleted
            && !isCurrent;
          hint.hidden = !showHint;
        }
      });

      // Proportional progress bar:
      //   completed sections → full weight
      //   current section    → half weight (so "halfway through" feels right)
      let completedWeight = 0;
      SECTIONS.forEach((s, k) => {
        if (state.completed.has(s.id)) {
          completedWeight += s.weight;
        } else if (k === state.currentIdx) {
          completedWeight += s.weight * 0.5;
        }
      });
      const pct = Math.min(100, (completedWeight / TOTAL_WEIGHT) * 100);
      progressFill.style.width = pct + '%';
      progressLabel.textContent = SECTIONS[state.currentIdx].label;

      // Back: hidden on first section (consistent with hidden Next on last)
      const isFirst = state.currentIdx === 0;
      backBtn.classList.toggle('is-hidden', isFirst);
      const prev = SECTIONS[state.currentIdx - 1];
      backBtn.textContent = prev ? `← Back: ${prev.label}` : '← Back';

      // Next: hidden until current section is completed.
      // On the last section, Next is also hidden — replaced with the
      // hand-off message that points learners to Thinkific's footer.
      const isLast = state.currentIdx === SECTIONS.length - 1;
      const currentId = SECTIONS[state.currentIdx].id;
      const isComplete = state.completed.has(currentId);
      const next = SECTIONS[state.currentIdx + 1];

      if (isLast) {
        nextBtn.classList.add('is-hidden');
        // Show hand-off only after the section has reported done.
        handoffEl.classList.toggle('is-visible', isComplete);
      } else {
        handoffEl.classList.remove('is-visible');
        // Show Next only when current section is done.
        nextBtn.classList.toggle('is-hidden', !isComplete);
        nextBtn.textContent = next ? `Next: ${next.label} →` : 'Next →';
      }
    }

    /* ──────────────────────────────────────────────
       Section transitions
    ────────────────────────────────────────────── */
    let suppressHistory = false;

    function show(idx) {
      idx = Math.max(0, Math.min(SECTIONS.length - 1, idx));
      state.currentIdx = idx;
      const section = SECTIONS[idx];
      state.visited.add(section.id);

      // Auto sections complete on activation.
      if (section.type === 'auto') {
        markComplete(section.id);
      }
      // View sections complete after a short dwell so the learner has
      // time to land on the screen before the Next button appears.
      // (Re-arming the timer on revisit is fine — markComplete is idempotent.)
      if (section.type === 'view' && !state.completed.has(section.id)) {
        clearTimeout(state.dwellTimers[section.id]);
        state.dwellTimers[section.id] = setTimeout(() => {
          markComplete(section.id);
        }, section.dwell || 1000);
      }

      // When the wrap-up section becomes active, send the collected
      // lesson state into its iframe so it can render the artifacts
      // (e.g. "you said you're feeling …, you chose …").
      if (section.id === 'wrap') {
        sendStateToWrap();
      }

      render();

      // Push a history entry so the browser Back button walks through
      // sections instead of leaving the lesson entirely. We skip this
      // on initial load and on popstate-driven transitions.
      if (!suppressHistory) {
        if (!history.state || history.state.sectionId !== section.id) {
          history.pushState({ sectionId: section.id }, '', '#' + section.id);
        }
      }
    }

    function markComplete(id, data) {
      state.completed.add(id);
      if (data !== undefined) state.data[id] = data;
      render();
    }

    backBtn.addEventListener('click', () => { if (state.currentIdx > 0) show(state.currentIdx - 1); });
    nextBtn.addEventListener('click', () => { if (state.currentIdx < SECTIONS.length - 1) show(state.currentIdx + 1); });

    /* ──────────────────────────────────────────────
       postMessage bridge — sections inside iframes
       report completion (and any captured data) here.
    ────────────────────────────────────────────── */
    window.addEventListener('message', (e) => {
      const msg = e.data;
      if (!msg || typeof msg !== 'object') return;
      if (msg.type === 'sectionComplete' && msg.id) {
        markComplete(msg.id, msg.data);
        // If the learner just completed Check-in or Make-a-choice and the
        // wrap-up section is already mounted, push the fresh state in.
        sendStateToWrap();
      }
    });

    function sendStateToWrap() {
      const wrapEl = sectionEls.find(el => el.dataset.id === 'wrap');
      if (!wrapEl) return;
      const iframe = wrapEl.querySelector('iframe');
      if (!iframe || !iframe.contentWindow) return;
      iframe.contentWindow.postMessage({
        type: 'lessonState',
        data: state.data,
      }, '*');
    }

    /* ──────────────────────────────────────────────
       Iframe loading, error handling, and in-iframe
       keyboard event forwarding.

       Each iframe starts with `.is-loading` on its
       section wrapper. We clear it when the iframe's
       `load` event fires (and the inner document has
       actually rendered a body). If the load never
       arrives within a timeout, we flip to error.
    ────────────────────────────────────────────── */
    const LOAD_TIMEOUT_MS = 8000;

    function setupIframe(el) {
      const iframe = el.querySelector('iframe');
      if (!iframe) return;
      let timeoutId = setTimeout(() => {
        el.classList.remove('is-loading');
        el.classList.add('is-error');
      }, LOAD_TIMEOUT_MS);

      const onLoad = () => {
        clearTimeout(timeoutId);
        // Sanity check: did we actually land on a real document?
        try {
          const doc = iframe.contentDocument;
          if (!doc || !doc.body || !doc.body.firstElementChild) {
            el.classList.remove('is-loading');
            el.classList.add('is-error');
            return;
          }
        } catch (err) {
          el.classList.remove('is-loading');
          el.classList.add('is-error');
          return;
        }
        el.classList.remove('is-loading', 'is-error');

        // Forward arrow keys + Escape from inside the iframe to the
        // parent so keyboard shortcuts work regardless of focus.
        try {
          const doc = iframe.contentDocument;
          doc.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowLeft' || e.key === 'Escape') {
              // Only forward if focus is NOT inside a form control,
              // so the learner can still type in text fields.
              const tag = doc.activeElement && doc.activeElement.tagName;
              if (tag === 'INPUT' || tag === 'TEXTAREA' || doc.activeElement?.isContentEditable) return;
              // Dispatch an equivalent event on the parent document.
              const evt = new KeyboardEvent('keydown', { key: e.key, bubbles: true });
              document.dispatchEvent(evt);
            }
          });
        } catch (err) { /* cross-origin — ignore */ }

        // Push collected state into wrap-up on first load.
        if (el.dataset.id === 'wrap') sendStateToWrap();
      };

      iframe.addEventListener('load', onLoad);
      iframe.addEventListener('error', () => {
        clearTimeout(timeoutId);
        el.classList.remove('is-loading');
        el.classList.add('is-error');
      });
    }

    sectionEls.forEach(setupIframe);

    // Retry buttons: clear the error, re-set loading, reload the iframe src.
    sectionEls.forEach((el) => {
      const retry = el.querySelector('.retry');
      if (!retry) return;
      retry.addEventListener('click', () => {
        const iframe = el.querySelector('iframe');
        if (!iframe) return;
        el.classList.remove('is-error');
        el.classList.add('is-loading');
        // Reassigning src forces a fresh load.
        const src = iframe.getAttribute('src');
        iframe.setAttribute('src', src);
      });
    });

    /* ──────────────────────────────────────────────
       Top-level keyboard shortcuts. These also fire
       when an event is forwarded from inside an iframe.
    ────────────────────────────────────────────── */
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') {
        if (state.currentIdx < SECTIONS.length - 1
            && state.completed.has(SECTIONS[state.currentIdx].id)) {
          show(state.currentIdx + 1);
        }
      } else if (e.key === 'ArrowLeft') {
        if (state.currentIdx > 0) show(state.currentIdx - 1);
      }
    });

    /* ──────────────────────────────────────────────
       Browser back-button safety: walk through sections
       on popstate instead of leaving the lesson.
    ────────────────────────────────────────────── */
    window.addEventListener('popstate', (e) => {
      const id = e.state && e.state.sectionId;
      if (!id) return;
      const idx = SECTIONS.findIndex(s => s.id === id);
      if (idx === -1) return;
      suppressHistory = true;
      show(idx);
      suppressHistory = false;
    });

    /* ──────────────────────────────────────────────
       Initial render
    ────────────────────────────────────────────── */
    // Honour a deep-link hash like "#choice" on initial load.
    const initialIdx = (() => {
      const hashId = (location.hash || '').replace(/^#/, '');
      const idx = SECTIONS.findIndex(s => s.id === hashId);
      return idx === -1 ? 0 : idx;
    })();
    suppressHistory = true;
    show(initialIdx);
    suppressHistory = false;
    // Seed history so Back goes through sections, not out of the lesson.
    history.replaceState({ sectionId: SECTIONS[initialIdx].id }, '', '#' + SECTIONS[initialIdx].id);
  </script>
</body>
</html>
