<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orientation — Module 2</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg:       #F2F0EB;
      --color-surface:  #FAFAF7;
      --color-text:     #1A1A1A;
      --color-slate:    #6B6568;
      --color-navy:     #120DA6;
      --color-sky:      #C4E5F2;
      --color-border:   #E8E2D9;
    }

    html, body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      line-height: 1.65;
    }

    /* ============ TOP BAR (persistent progress + time) ============ */
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(242, 240, 235, 0.92);
      backdrop-filter: saturate(140%) blur(10px);
      -webkit-backdrop-filter: saturate(140%) blur(10px);
      border-bottom: 1px solid var(--color-border);
    }
    .top-bar-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 14px clamp(20px, 5vw, 60px);
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .progress-block {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      max-width: 520px;
    }
    .progress-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--color-slate);
    }
    .progress-bar {
      height: 4px;
      width: 100%;
      background: var(--color-border);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      display: block;
      height: 100%;
      width: 12.5%;
      background: var(--color-navy);
      border-radius: 999px;
    }
    .time-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--color-slate);
      white-space: nowrap;
    }
    .time-chip svg {
      width: 14px;
      height: 14px;
      stroke: var(--color-slate);
    }

    /* ============ VISUAL ANCHOR ============ */
    .visual-anchor {
      max-width: 1100px;
      margin: clamp(28px, 5vw, 56px) auto 0;
      padding: 0 clamp(20px, 5vw, 60px);
    }
    .anchor-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 6;
      border-radius: 20px;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 30%, #F2BDD6 0%, rgba(242,189,214,0) 55%),
        radial-gradient(circle at 80% 70%, #C4E5F2 0%, rgba(196,229,242,0) 60%),
        linear-gradient(135deg, #FAFAF7 0%, #F2F0EB 100%);
      border: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .anchor-frame svg {
      width: 38%;
      max-width: 220px;
      height: auto;
      opacity: 0.9;
    }

    /* ============ HERO TEXT ============ */
    .hero {
      max-width: 760px;
      margin: 0 auto;
      padding: clamp(32px, 5vw, 56px) clamp(20px, 5vw, 60px) clamp(24px, 4vw, 40px);
      text-align: center;
    }
    .eyebrow {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-navy);
      margin-bottom: 16px;
    }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 700;
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
      color: var(--color-text);
      margin: 0 auto;
      max-width: 18ch;
    }
    .anchor-text {
      margin: 24px auto 0;
      max-width: 56ch;
      font-size: clamp(1.05rem, 1.4vw, 1.2rem);
      color: var(--color-slate);
      line-height: 1.6;
    }

    /* ============ PRIMARY CTA ============ */
    .cta-row {
      display: flex;
      justify-content: center;
      padding: 8px clamp(20px, 5vw, 60px) clamp(40px, 6vw, 64px);
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--color-navy);
      color: #FFFFFF;
      border: none;
      border-radius: 10px;
      padding: 18px 36px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      box-shadow: 0 2px 8px rgba(18, 13, 166, 0.18);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(18, 13, 166, 0.25);
    }
    .btn-primary svg {
      width: 16px;
      height: 16px;
      stroke: #FFFFFF;
    }

    /* ============ FOOTER NAV ============ */
    .footer-nav {
      border-top: 1px solid var(--color-border);
      background: var(--color-bg);
    }
    .footer-nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 18px clamp(20px, 5vw, 60px);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 16px;
    }
    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--color-slate);
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      justify-self: start;
      transition: color 0.15s ease;
    }
    .nav-link:hover { color: var(--color-navy); }
    .nav-link svg { width: 14px; height: 14px; stroke: currentColor; }
    .page-indicator {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--color-slate);
      letter-spacing: 0.02em;
      justify-self: center;
    }

    /* ============ MOBILE ============ */
    @media (max-width: 640px) {
      .top-bar-inner { gap: 12px; }
      .time-chip { padding: 5px 10px; font-size: 0.75rem; }
      .anchor-frame { aspect-ratio: 4 / 3; }
      .anchor-frame svg { width: 50%; }
      .btn-primary { width: 100%; justify-content: center; padding: 18px 24px; }
      .cta-row { display: block; }
      .footer-nav-inner { grid-template-columns: auto 1fr; }
      .page-indicator { justify-self: end; }
    }
  </style>
</head>
<body>
  <!-- Persistent top bar: progress + time -->
  <header class="top-bar" role="banner">
    <div class="top-bar-inner">
      <div class="progress-block" aria-label="Course progress">
        <span class="progress-label">Step 1 of 8</span>
        <div class="progress-bar" role="progressbar" aria-valuenow="12" aria-valuemin="0" aria-valuemax="100">
          <span class="progress-fill"></span>
        </div>
      </div>
      <span class="time-chip" aria-label="Estimated time">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="9"></circle>
          <path d="M12 7v5l3 2"></path>
        </svg>
        About 8 min
      </span>
    </div>
  </header>

  <main>
    <!-- Visual anchor -->
    <div class="visual-anchor">
      <div class="anchor-frame" aria-hidden="true">
        <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="100" r="78" stroke="#120DA6" stroke-width="2.5" stroke-dasharray="6 8" opacity="0.6"/>
          <circle cx="100" cy="100" r="50" fill="#FAFAF7" stroke="#120DA6" stroke-width="2.5"/>
          <path d="M82 100 L96 114 L120 88" stroke="#120DA6" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

    <!-- Heading + anchor text -->
    <section class="hero">
      <span class="eyebrow">Orientation</span>
      <h1>Welcome to Building Routines</h1>
      <p class="anchor-text">
        Small daily routines do the heavy lifting that willpower can't. In this module you'll design one routine that fits your real life — and try it before you leave.
      </p>
    </section>

    <!-- Single primary action -->
    <div class="cta-row">
      <a href="#" class="btn-primary">
        Start lesson
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 12h14"></path>
          <path d="M13 5l7 7-7 7"></path>
        </svg>
      </a>
    </div>
  </main>

  <!-- Persistent footer nav -->
  <nav class="footer-nav" aria-label="Course navigation">
    <div class="footer-nav-inner">
      <a href="#" class="nav-link">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 12H5"></path>
          <path d="M11 19l-7-7 7-7"></path>
        </svg>
        Previous
      </a>
      <span class="page-indicator">1 / 8</span>
    </div>
  </nav>
</body>
</html>
