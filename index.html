<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stackable</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400&family=Plus+Jakarta+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0ebe3;
    --ink: #1a1a1a;
    --muted: #8a8278;
    --orange: #e8440a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .logo {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 500;
    font-size: 16px;
    letter-spacing: 0.02em;
    text-transform: none;
    color: var(--ink);
    margin-bottom: 4rem;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards;
    animation-delay: 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    display: flex;
    gap: 3px;
    align-items: flex-end;
  }

  .headline {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 300;
    font-size: clamp(1.8rem, 4.5vw, 3.4rem);
    line-height: 1.25;
    color: var(--ink);
    text-align: center;
    max-width: 720px;
    opacity: 0;
    animation: fadeUp 1s ease forwards;
    animation-delay: 0.7s;
    letter-spacing: -0.01em;
  }

  .headline em {
    font-style: italic;
    color: var(--orange);
  }

  .footnote {
    position: fixed;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--muted);
    opacity: 0;
    animation: fadeUp 0.8s ease forwards;
    animation-delay: 1.4s;
    white-space: nowrap;
  }

  .dot {
    display: inline-block;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--orange);
    margin: 0 8px;
    vertical-align: middle;
    opacity: 0.5;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 128px;
  }
</style>
</head>
<body>

<div class="grain"></div>

<div class="logo">
  Stackable
</div>

<h1 class="headline">
  The workspace that ends<br>professional <span style="color:var(--orange);">amnesia.</span>
</h1>

<div class="footnote">
  stackable.app <span class="dot"></span> Melbourne, Australia <span class="dot"></span> 2026
</div>

</body>
</html>
