<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orientation — Module 2</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg:       #F2F0EB;
      --color-surface:  #FAFAF7;
      --color-text:     #1A1A1A;
      --color-slate:    #6B6568;
      --color-navy:     #120DA6;
      --color-sky:      #C4E5F2;
      --color-border:   #E8E2D9;
    }

    html, body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      line-height: 1.65;
      display: flex;
      flex-direction: column;
    }

    /* ============ HERO ============ */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      max-width: 760px;
      margin: 0 auto;
      padding: clamp(48px, 10vw, 120px) clamp(20px, 5vw, 60px) clamp(40px, 6vw, 80px);
      text-align: center;
    }

    .time-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 999px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--color-slate);
      margin-bottom: 24px;
    }
    .time-pill svg {
      width: 14px;
      height: 14px;
      stroke: var(--color-slate);
    }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 700;
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
      color: var(--color-text);
      margin: 0 auto;
      max-width: 18ch;
    }
    .anchor-text {
      margin: 24px auto 0;
      max-width: 56ch;
      font-size: clamp(1.05rem, 1.4vw, 1.2rem);
      color: var(--color-slate);
      line-height: 1.6;
    }

    /* ============ CTA ============ */
    .cta-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 0 clamp(20px, 5vw, 60px) clamp(40px, 6vw, 64px);
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--color-navy);
      color: #FFFFFF;
      border: none;
      border-radius: 10px;
      padding: 18px 36px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      box-shadow: 0 2px 8px rgba(18, 13, 166, 0.18);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(18, 13, 166, 0.25);
    }
    .btn-primary svg {
      width: 16px;
      height: 16px;
      stroke: #FFFFFF;
    }
    /* ============ MOBILE ============ */
    @media (max-width: 640px) {
      .btn-primary { width: 100%; justify-content: center; padding: 18px 24px; }
      .cta-row { display: block; text-align: center; }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <span class="time-pill" aria-label="Estimated time">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="9"></circle>
          <path d="M12 7v5l3 2"></path>
        </svg>
        About 8 min
      </span>

      <h1>Lesson name goes here</h1>
      <p class="anchor-text">
        Write two sentences max. First sentence: name something the learner has actually experienced. Second sentence: say what they'll do here. No selling.
      </p>
    </section>

    <div class="cta-row">
      <a href="#" class="btn-primary">
        Start lesson
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 12h14"></path>
          <path d="M13 5l7 7-7 7"></path>
        </svg>
      </a>

    </div>
  </main>
</body>
</html>
