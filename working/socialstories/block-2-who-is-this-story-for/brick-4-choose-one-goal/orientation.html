<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orientation — Module 2</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg:       #F2F0EB;
      --color-surface:  #FAFAF7;
      --color-text:     #1A1A1A;
      --color-slate:    #6B6568;
      --color-navy:     #120DA6;
      --color-sky:      #C4E5F2;
      --color-border:   #E8E2D9;
    }

    html, body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      line-height: 1.65;
    }

    /* ============ VISUAL ANCHOR ============ */
    .visual-anchor {
      max-width: 1100px;
      margin: clamp(28px, 5vw, 56px) auto 0;
      padding: 0 clamp(20px, 5vw, 60px);
    }
    .anchor-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 6;
      border-radius: 20px;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 30%, #F2BDD6 0%, rgba(242,189,214,0) 55%),
        radial-gradient(circle at 80% 70%, #C4E5F2 0%, rgba(196,229,242,0) 60%),
        linear-gradient(135deg, #FAFAF7 0%, #F2F0EB 100%);
      border: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .anchor-frame svg {
      width: 38%;
      max-width: 220px;
      height: auto;
      opacity: 0.9;
    }

    /* ============ HERO TEXT ============ */
    .hero {
      max-width: 760px;
      margin: 0 auto;
      padding: clamp(32px, 5vw, 56px) clamp(20px, 5vw, 60px) clamp(24px, 4vw, 40px);
      text-align: center;
    }
    .time-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--color-slate);
      margin-bottom: 20px;
    }
    .time-pill svg {
      width: 14px;
      height: 14px;
      stroke: var(--color-slate);
    }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 700;
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
      color: var(--color-text);
      margin: 0 auto;
      max-width: 18ch;
    }
    .anchor-text {
      margin: 24px auto 0;
      max-width: 56ch;
      font-size: clamp(1.05rem, 1.4vw, 1.2rem);
      color: var(--color-text);
      line-height: 1.6;
    }

    /* ============ MOBILE ============ */
    @media (max-width: 640px) {
      .anchor-frame { aspect-ratio: 4 / 3; }
      .anchor-frame svg { width: 50%; }
    }
  </style>
</head>
<body>
  <main>
    <!-- Visual anchor -->
    <div class="visual-anchor">
      <div class="anchor-frame" aria-hidden="true">
        <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="100" r="78" stroke="#120DA6" stroke-width="2.5" stroke-dasharray="6 8" opacity="0.6"/>
          <circle cx="100" cy="100" r="50" fill="#FAFAF7" stroke="#120DA6" stroke-width="2.5"/>
          <path d="M82 100 L96 114 L120 88" stroke="#120DA6" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

    <!-- Heading + anchor text -->
    <section class="hero">
      <span class="time-pill" aria-label="Estimated time">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="9"></circle>
          <path d="M12 7v5l3 2"></path>
        </svg>
        About X min
      </span>
      <h1>Choose one goal</h1>
      <p class="anchor-text">
        Briefly explain why this lesson matters to learner
      </p>
    </section>
  </main>
</body>
</html>
