<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Social Stories — Working Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F2F0EB;
    --bg-neutral: #F2F2F2;
    --card: #FFFFFF;
    --border: #E8E2D9;
    --navy: #120DA6;
    --sky: #C4E5F2;
    --heading: #1A1A1A;
    --body: #1A1A1A;
    --slate: #6B6568;
    --shadow-card: 0 2px 8px rgba(0,0,0,0.06);
    --shadow-float: 0 4px 24px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--body);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: clamp(1rem, 1.2vw, 1.25rem);
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 960px;
    margin: 0 auto;
    padding: clamp(48px, 10vw, 140px) clamp(24px, 6vw, 80px);
  }

  header { margin-bottom: clamp(32px, 5vw, 56px); }
  .eyebrow {
    font-size: 0.8125rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--slate);
    margin: 0 0 12px;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: clamp(2rem, 6vw, 4rem);
    line-height: 1.05;
    letter-spacing: -0.03em;
    color: var(--heading);
    margin: 0 0 16px;
  }
  .lede {
    max-width: 65ch;
    color: var(--slate);
    margin: 0;
  }

  .blocks { display: flex; flex-direction: column; gap: 16px; }

  details.block {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow-card);
    overflow: hidden;
  }
  details.block[open] { box-shadow: var(--shadow-float); }

  summary.block-summary {
    list-style: none;
    cursor: pointer;
    padding: 24px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    transition: background 140ms ease;
  }
  summary.block-summary::-webkit-details-marker { display: none; }
  summary.block-summary:hover { background: #FCFBF8; }

  .block-title {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 1.125rem;
    line-height: 1.3;
    letter-spacing: -0.01em;
    color: var(--heading);
    margin: 0;
  }
  .block-meta {
    font-size: 0.875rem;
    color: var(--slate);
    font-weight: 500;
    white-space: nowrap;
  }
  .chevron {
    flex: 0 0 auto;
    width: 20px;
    height: 20px;
    color: var(--slate);
    transition: transform 180ms ease;
  }
  details[open] .chevron { transform: rotate(180deg); }

  .brick-list {
    padding: 4px 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    border-top: 1px solid var(--border);
    margin-top: 0;
  }

  .brick-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 16px;
    border-radius: 10px;
    color: var(--heading);
    text-decoration: none;
    font-weight: 500;
    transition: background 140ms ease;
  }
  .brick-link:hover,
  .brick-link:focus-visible {
    background: var(--bg-neutral);
    outline: none;
  }
  .brick-link .label {
    display: flex;
    align-items: baseline;
    gap: 12px;
    min-width: 0;
  }
  .brick-link .num {
    font-size: 0.8125rem;
    font-weight: 600;
    color: var(--slate);
    flex: 0 0 auto;
    font-variant-numeric: tabular-nums;
  }
  .brick-link .name {
    font-size: 1rem;
    color: var(--heading);
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .brick-link .open {
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--navy);
    opacity: 0;
    transition: opacity 140ms ease;
    flex: 0 0 auto;
  }
  .brick-link:hover .open,
  .brick-link:focus-visible .open { opacity: 1; }

  footer {
    margin-top: clamp(56px, 8vw, 96px);
    padding-top: 32px;
    border-top: 1px solid var(--border);
    color: var(--slate);
    font-size: 0.875rem;
  }
  footer a { color: var(--slate); text-decoration: underline; }

  @media (max-width: 640px) {
    summary.block-summary { padding: 20px 20px; }
    .block-title { font-size: 1rem; }
    .brick-link { padding: 12px 14px; }
    .brick-link .open { display: none; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <p class="eyebrow">Stackable Lessons · Working</p>
    <h1>Social Stories</h1>
    <p class="lede">Preview each brick. Click a module to expand, then a lesson to open it.</p>
  </header>

  <div class="blocks" id="blocks"></div>

  <footer>
    Source: <a href="https://github.com/stackableapp/stackable-lessons/tree/main/social-stories/working" target="_blank" rel="noopener">stackable-lessons/social-stories/working</a>
  </footer>

</div>

<script>
  const blocks = [
    {
      id: 'block-1-what-is-a-social-story',
      title: 'Block 1: What is a Social Story',
      bricks: [
        { id: 'brick-1-welcome',                      name: 'Welcome' },
        { id: 'brick-2-reading-the-room',             name: 'Reading the room' },
        { id: 'brick-3-you-dont-have-to-be-an-expert', name: "You don't have to be an expert" },
        { id: 'brick-4-youre-in-good-company',        name: "You're in good company" }
      ]
    },
    {
      id: 'block-2-who-is-this-story-for',
      title: 'Block 2: Who is this story for?',
      bricks: [
        { id: 'brick-1-is-a-social-story-the-right-choice', name: 'Is a Social Story the right choice?' },
        { id: 'brick-2-choose-your-student',                name: 'Choose your student' },
        { id: 'brick-3-your-student-profile',               name: 'Your student profile' },
        { id: 'brick-4-choose-one-goal',                    name: 'Choose one goal' },
        { id: 'brick-5-plan-your-story',                    name: 'Plan your story' }
      ]
    },
    {
      id: 'block-3-the-sentences-inside-a-social-story',
      title: 'Block 3: The sentences inside a Social Story',
      bricks: [
        { id: 'brick-1-descriptive-sentences',  name: 'Descriptive sentences' },
        { id: 'brick-2-perspective-sentences',  name: 'Perspective sentences' },
        { id: 'brick-3-coaching-sentences',     name: 'Coaching sentences' }
      ]
    },
    {
      id: 'block-4-time-to-write',
      title: 'Block 4: Time to write',
      bricks: [
        { id: 'brick-1-build-your-story',   name: 'Build your story' },
        { id: 'brick-2-ready-for-feedback', name: 'Ready for feedback' },
        { id: 'brick-3-share-your-story',   name: 'Share your story' }
      ]
    }
  ];

  const mount = document.getElementById('blocks');
  const chevronSVG = `<svg class="chevron" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 8l5 5 5-5"/></svg>`;

  blocks.forEach(block => {
    const details = document.createElement('details');
    details.className = 'block';

    const summary = document.createElement('summary');
    summary.className = 'block-summary';
    summary.innerHTML = `
      <h2 class="block-title">${block.title}</h2>
      <span class="block-meta">${block.bricks.length} ${block.bricks.length === 1 ? 'lesson' : 'lessons'}</span>
      ${chevronSVG}
    `;
    details.appendChild(summary);

    const list = document.createElement('div');
    list.className = 'brick-list';
    block.bricks.forEach((brick, idx) => {
      const a = document.createElement('a');
      a.className = 'brick-link';
      a.href = `/working/socialstories/${block.id}/${brick.id}/`;
      a.target = '_blank';
      a.rel = 'noopener';
      a.innerHTML = `
        <span class="label">
          <span class="num">${idx + 1}.</span>
          <span class="name">${brick.name}</span>
        </span>
        <span class="open">Open →</span>
      `;
      list.appendChild(a);
    });
    details.appendChild(list);

    mount.appendChild(details);
  });
</script>

</body>
</html>
